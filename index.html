<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autista Avo Mundo - M. Galvão</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background-color: #f3e5f5;
            background-image: url('fundo_mgalvao.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            color: #333;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.92);
            margin: 20px auto;
            padding: 30px;
            max-width: 900px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .autora {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #6a4c93;
            object-fit: cover;
            margin: 20px 0;
        }
        h1 { color: #6a4c93; margin: 10px 0; font-size: 2.5em; }
        h2 { color: #8e44ad; margin-top: 30px; }
        .livros {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .livro {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .livro img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
        }
        .livro a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #6a4c93;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
