<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M. Galvão - Autora | Autista Avo Mundo</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      margin: 0;
      padding: 0;
      color: #2d2d2d;
      line-height: 1.6;
      background-image: url('fundo_mgalvao.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
    }
    .overlay {
      background: rgba(248, 245, 255, 0.75);
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .cabecalho {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(90,42,130,0.15);
    }
    .foto-autora {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #5a2a82;
      margin-bottom: 15px;
    }
    h1 {
      color: #5a2a82;
      font-size: 32px;
      margin: 10px 0;
    }
    .subtitulo {
      font-size: 18px;
      color: #555;
      font-style: italic;
    }
    .grade-livros {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 30px;
      padding: 0 10px;
    }
    .livro {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(6px);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(90,42,130,0.12);
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
    }
    .livro:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(90,42,130,0.2);
    }
    .livro img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
    }
    .livro-info {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .livro-info h2 {
      color: #5a2a82;
      font-size: 20px;
      margin: 0 0 10px 0;
    }
    .livro-info p {
      font-size: 15px;
      color: #444;
      margin-bottom: 20px;
      flex-grow: 1;
    }
    .botao {
      display: inline-block;
      background: #5a2a82;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 15px;
      transition: background 0.3s;
      text-align: center;
      align-self: flex-start;
    }
    .botao:hover {
      background: #4a1f6b;
    }
    .rodape {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: #5a2a82;
      font-size: 16px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 15px;
    }
    @media (max-width: 600px) {
      .overlay { padding: 20px 15px; }
      h1 { font-size: 26px; }
      .livro img { height: 320px; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">
      
      <div class="cabecalho">
        <img src="Retrato vibrante com óculos de aviador.png" alt="Magda Galvão" class="foto-autora">
        <h1>M. Galvão</h1>
        <p class="subtitulo">Autora de mundos fantásticos, histórias de superação e reflexões para a alma<br>
        Cuidar · Acolher · Encantar 💜</p>
      </div>

      <div class="grade-livros">
        
        <div class="livro">
          <img src="as pecas da minha mente capa.png" alt="As Peças da Minha Mente">
          <div class="livro-info">
            <h2>As Peças da Minha Mente</h2>
            <p>Quando a realidade já não fazia sentido. Uma jornada de dor, amor e reencontro.</p>
