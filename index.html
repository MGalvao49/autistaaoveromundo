<title>M. Galvão - Escritora</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,Arial,sans-serif;background:#0f0c29;color:#f8f8f8;line-height:1.6}
header{position:fixed;top:0;width:100%;background:#0f0c29cc;backdrop-filter:blur(10px);padding:1rem;z-index:100;border-bottom:1px solid #d4af3733}
nav{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}
.logo{font-size:1.5rem;font-weight:bold;color:#d4af37}
nav a{color:#f8f8f8;text-decoration:none;margin-left:1.5rem;font-size:.9rem}
nav a:hover{color:#d4af37}
.hero{padding:8rem 1rem 4rem;text-align:center;max-width:800px;margin:0 auto}
.hero h1{font-size:2.5rem;margin-bottom:1rem;background:linear-gradient(45deg,#d4af37,#f9d423);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-block;background:#d4af37;color:#0f0c29;padding:.8rem 1.5rem;border-radius:50px;text-decoration:none;font-weight:bold;margin:.5rem;border:none;cursor:pointer}
.btn:hover{background:#f9d423}
section{padding:3rem 1rem;max-width:1200px;margin:0 auto}
h2{text-align:center;font-size:2rem;margin-bottom:2rem;color:#d4af37}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
.card{background:#1a1633;padding:1.5rem;border-radius:10px;border:1px solid #d4af3733}
.card h3{color:#d4af37;margin-bottom:.5rem}
.card .capa{width:100%;height:200px;background:linear-gradient(135deg,#d4af37,#0f0c29);border-radius:8px;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#0f0c29;text-align:center;padding:1rem}
.card .arquivo{font-size:.75rem;color:#d4af3799;margin:.5rem 0}
.card .btn{width:100%;margin:.3rem 0;font-size:.9rem}
.modal{display:none;position:fixed;inset:0;background:#000c;z-index:200;overflow-y:auto;padding:2rem 1rem}
.modal.active{display:flex;align-items:flex-start;justify-content:center}
.modal-content{background:#1a1633;padding:2rem;border-radius:10px;max-width:800px;width:100%;position:relative;max-height:90vh;overflow-y:auto}
